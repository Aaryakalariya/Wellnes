<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - Wellness</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- Custom CSS -->
<link rel="stylesheet" href="login.css">

</head>
<body>

<div class="login-wrapper">

    <div class="login-card">

        <!-- Logo -->
        <div class="login-brand">
            <div class="logo-circle">
                <i data-lucide="pill"></i>
            </div>
            <h2>Wellness</h2>
        </div>

        <p class="login-subtitle">Welcome back! Please login to continue.</p>

        <!-- Login Form -->
        <form>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <button type="submit" class="btn-login">
                Login
            </button>

        </form>

        <div class="login-footer">
            <p>Don't have an account? <a href="#">Sign Up</a></p>
        </div>

    </div>

</div>

<script>
lucide.createIcons();
</script>

</body>
</html>
</body>
</html>
