<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wellness - Your Health Simplified</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,100..1000&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css')}}">

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</head>

<body>

<div class="container py-5">

    <h2 class="page-title">🛒 Your Cart</h2>

    <!-- Cart Items -->
    <div id="cartItems"></div>

    <!-- Summary -->
    <div class="summary-card">
        <h4>Order Summary</h4>
        <p>Total Items: <span id="totalItems">0</span></p>
        <p>Total Price: ₹ <span id="totalPrice">0</span></p>

        <button class="btn-place-order" onclick="placeOrder()">
            Place Order
        </button>
    </div>
</div>

<!-- Popup Modal -->
<div class="order-popup" id="orderPopup">
    <div class="popup-content">
        <h3>🎉 Order Placed!</h3>
        <p>Your medicines will be delivered soon.</p>

        <div id="orderDetails"></div>

        <button onclick="closePopup()">Close</button>
    </div>
</div>

<script src="cart.js"></script>
</body>
</html>
